<!DOCTYPE html>
<html>
<head><title>Gerar ícones</title></head>
<body>
<p>Clique nos botões pra baixar os ícones. Depois salve na pasta drive-notes/.</p>
<canvas id="c192" width="192" height="192"></canvas>
<button onclick="download(192)">Baixar 192x192</button>
<br><br>
<canvas id="c512" width="512" height="512"></canvas>
<button onclick="download(512)">Baixar 512x512</button>

<script>
function drawIcon(size) {
  const canvas = document.getElementById('c' + size);
  const ctx = canvas.getContext('2d');
  const s = size;

  // Background
  ctx.fillStyle = '#1a1a2e';
  ctx.beginPath();
  ctx.roundRect(0, 0, s, s, s * 0.15);
  ctx.fill();

  // Notepad body
  const pad = s * 0.18;
  const w = s - pad * 2;
  const h = s * 0.55;
  const y = s * 0.22;
  ctx.fillStyle = '#2a2a4a';
  ctx.beginPath();
  ctx.roundRect(pad, y, w, h, s * 0.04);
  ctx.fill();

  // Lines on notepad
  ctx.strokeStyle = '#4a4a6a';
  ctx.lineWidth = s * 0.01;
  for (let i = 1; i <= 4; i++) {
    const ly = y + h * (i / 5.5) + s * 0.02;
    ctx.beginPath();
    ctx.moveTo(pad + s * 0.06, ly);
    ctx.lineTo(pad + w - s * 0.06, ly);
    ctx.stroke();
  }

  // Pen/pencil
  ctx.save();
  ctx.translate(s * 0.62, s * 0.68);
  ctx.rotate(0.5);
  ctx.fillStyle = '#7c5cbf';
  ctx.fillRect(-s * 0.015, -s * 0.2, s * 0.04, s * 0.3);
  ctx.fillStyle = '#e0e0e0';
  ctx.beginPath();
  ctx.moveTo(-s * 0.015, s * 0.1);
  ctx.lineTo(s * 0.025, s * 0.1);
  ctx.lineTo(s * 0.005, s * 0.15);
  ctx.fill();
  ctx.restore();

  // "md" text
  ctx.fillStyle = '#bb86fc';
  ctx.font = `bold ${s * 0.1}px -apple-system, sans-serif`;
  ctx.textAlign = 'center';
  ctx.fillText('md', s * 0.5, s * 0.92);
}

drawIcon(192);
drawIcon(512);

function download(size) {
  const canvas = document.getElementById('c' + size);
  const link = document.createElement('a');
  link.download = 'icon-' + size + '.png';
  link.href = canvas.toDataURL('image/png');
  link.click();
}
</script>
</body>
</html>
